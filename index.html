        /* Force side-by-side with horizontal scroll on small screens */

            overflow-x: auto;
            -webkit-overflow-scrolling: touch;

    </style>
</head>

    <script>
        function initSparks() {
            const canvas = document.getElementById('sparks');
            const ctx = canvas.getContext('2d', { alpha: true });
            
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            const particles = [];
            const particleCount = 52;

            class Particle {
                constructor() {
                    this.reset();
                }
                
                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height * 1.1;
                    this.size = Math.random() * 2.2 + 0.8;
                    this.speedY = Math.random() * 0.65 + 0.35;
                    this.speedX = (Math.random() - 0.5) * 0.35;
                    this.alpha = Math.random() * 0.55 + 0.35;
                    this.twinkleSpeed = Math.random() * 0.035 + 0.015;
                    this.twinklePhase = Math.random() * Math.PI * 2;
                }
                
                update() {
                    this.y -= this.speedY;
                    this.x += this.speedX;
                    this.twinklePhase += this.twinkleSpeed;
                    
                    if (this.x < 0 || this.x > width) {
                        this.speedX = -this.speedX * 0.6;
                    }
                    
                    if (this.y < -10) {
                        this.reset();
                        this.y = height + 10;
                    }
                }
                
                draw() {
                    const twinkle = Math.sin(this.twinklePhase) * 0.35 + 0.65;
                    const currentAlpha = this.alpha * twinkle;
                    
                    ctx.save();
                    ctx.shadowColor = '#D4AF37';
                    ctx.shadowBlur = this.size * 3.5;
                    
                    ctx.fillStyle = `rgba(212, 175, 55, ${currentAlpha})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    if (this.size > 1.8) {
                        ctx.fillStyle = `rgba(255, 235, 180, ${currentAlpha * 0.6})`;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * 0.45, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            }

            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);

            function animate() {
                ctx.clearRect(0, 0, width, height);
                
                for (let p of particles) {
                    p.update();
                    p.draw();
                }
                
                requestAnimationFrame(animate);
            }
            
            animate();
        }

        window.onload = function() {
            initSparks();
        }
    </script>
