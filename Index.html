<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #C9A96E;
      --gold-light: #E8CFAA;
      --cream:      #F5F0E8;
      --rose:       #C9A0A0;
      --bg:         #111010;
      --bg2:        #1C1A18;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      overflow: hidden;
    }

    /* ── Canvas shimmer background ── */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Radial vignette overlay ── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at 50% 48%,
        transparent 30%,
        rgba(10, 9, 8, 0.72) 80%,
        rgba(10, 9, 8, 0.95) 100%);
      pointer-events: none;
    }

    /* ── Thin horizontal rules ── */
    .rule {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      margin: 0 auto;
    }

    /* ── Main content ── */
    .stage {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
      text-align: center;
    }

    .eyebrow {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: clamp(0.6rem, 1.2vw, 0.72rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.3s;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 9vw, 7.5rem);
      letter-spacing: 0.12em;
      line-height: 1;
      color: var(--cream);
      opacity: 0;
      animation: fadeUp 1.4s ease forwards 0.5s;
    }

    .wordmark em {
      font-style: italic;
      color: var(--gold-light);
    }

    .rule-top {
      margin: 2rem auto 0;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 0.9s;
    }

    .message {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 2.6vw, 1.5rem);
      letter-spacing: 0.06em;
      color: var(--cream);
      opacity: 0.85;
      margin-top: 2.2rem;
      line-height: 1.7;
      max-width: 480px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.1s;
    }

    .sub {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: clamp(0.7rem, 1.4vw, 0.8rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 0.6rem;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.3s;
    }

    .rule-bottom {
      margin: 2.4rem auto 0;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 1.4s;
    }

    /* ── Social icons ── */
    .socials {
      display: flex;
      gap: 2.4rem;
      margin-top: 2.4rem;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.6s;
    }

    .socials a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--gold);
      transition: color 0.3s, transform 0.3s;
    }

    .socials a:hover {
      color: var(--gold-light);
      transform: translateY(-3px);
    }

    .socials a svg {
      width: 26px;
      height: 26px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .socials a span {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Fix the animated message opacity conflict */
    .message { opacity: 0; animation: fadeUp 1.2s ease forwards 1.1s; }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; opacity: 1 !important; }
    }
  </style>
</head>
<body>

<canvas id="shimmer"></canvas>
<div class="vignette"></div>

<main class="stage">
  <p class="eyebrow">Handcrafted fine jewellery</p>

  <h1 class="wordmark">Au<em>rèle</em></h1>

  <div class="rule rule-top"></div>

  <p class="message">The site is coming soon.</p>
  <p class="sub">Until then, find us below</p>

  <div class="rule rule-bottom"></div>

  <div class="socials">
    <!-- Instagram -->
    <a href="#" aria-label="Instagram">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4.5"/>
        <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
      <span>Instagram</span>
    </a>

    <!-- YouTube -->
    <a href="#" aria-label="YouTube">
      <svg viewBox="0 0 24 24">
        <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.97C18.88 4 12 4 12 4s-6.88 0-8.59.45A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.97C5.12 20 12 20 12 20s6.88 0 8.59-.45a2.78 2.78 0 0 0 1.95-1.97A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/>
        <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/>
      </svg>
      <span>YouTube</span>
    </a>
  </div>
</main>

<script>
  // ── Particle shimmer — scattered gold light ──
  const canvas = document.getElementById('shimmer');
  const ctx = canvas.getContext('2d');

  let W, H, particles;

  const GOLD_PALETTE = ['#C9A96E','#E8CFAA','#B8914A','#F0DDB0','#A07840'];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function makeParticle() {
    return {
      x:    Math.random() * W,
      y:    Math.random() * H,
      r:    Math.random() * 1.4 + 0.3,
      life: Math.random(),        // 0–1 phase
      speed: Math.random() * 0.0015 + 0.0005,
      color: GOLD_PALETTE[Math.floor(Math.random() * GOLD_PALETTE.length)],
      drift: (Math.random() - 0.5) * 0.12,
    };
  }

  function init() {
    resize();
    const count = Math.floor((W * H) / 5500);
    particles = Array.from({ length: count }, makeParticle);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Deep warm gradient base
    const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.75);
    grad.addColorStop(0,   '#2A2118');
    grad.addColorStop(0.5, '#1A1510');
    grad.addColorStop(1,   '#0E0B08');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    for (const p of particles) {
      p.life += p.speed;
      if (p.life > 1) { Object.assign(p, makeParticle(), { x: Math.random() * W, y: Math.random() * H, life: 0 }); continue; }

      const alpha = Math.sin(p.life * Math.PI);  // fade in → out
      ctx.beginPath();
      ctx.arc(p.x + p.drift * p.life * 60, p.y - p.life * 30, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha * 0.7;
      ctx.fill();
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); });
  init();
  draw();
</script>
</body>
</html>
